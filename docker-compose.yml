services:
  bolao:
    build: .
    container_name: bolao
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      BOLAO_DB: /data/bolao.db
      BOLAO_SECRET: "${BOLAO_SECRET}"
      ADMIN_USER: "${ADMIN_USER:-admin}"
      ADMIN_PASS: "${ADMIN_PASS}"
      GMAIL_USER: "${GMAIL_USER}"
      GMAIL_APP: "${GMAIL_APP}"
      PRECO_BRASIL: "${PRECO_BRASIL:-5}"
      PRECO_GRUPOS: "${PRECO_GRUPOS:-10}"
      FOOTBALL_DATA_TOKEN: "${FOOTBALL_DATA_TOKEN}"
    volumes:
      - bolao-data:/data

volumes:
  bolao-data:
